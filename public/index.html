<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FieldPro — Field Service Management Platform</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
:root {
  --bg:#0b0f1a; --surface:#111827; --surface2:#1a2235; --surface3:#1f2d44;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
  --text:#e8edf5; --muted:#6b7a99; --muted2:#8892aa;
  --blue:#3b82f6; --blue-d:rgba(59,130,246,0.15); --blue-b:rgba(59,130,246,0.25);
  --green:#22c55e; --green-d:rgba(34,197,94,0.12);
  --yellow:#f59e0b; --yellow-d:rgba(245,158,11,0.12);
  --red:#ef4444; --red-d:rgba(239,68,68,0.12);
  --orange:#f97316; --orange-d:rgba(249,115,22,0.12);
  --purple:#a855f7; --purple-d:rgba(168,85,247,0.12);
  --cyan:#06b6d4; --cyan-d:rgba(6,182,212,0.1);
  --font:'IBM Plex Sans',sans-serif; --mono:'IBM Plex Mono',monospace;
  --r:8px; --r2:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:4px;height:4px;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
input,textarea,select{font-family:var(--font);font-size:13px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);padding:8px 12px;outline:none;transition:border .15s;width:100%;}
input:focus,textarea:focus,select:focus{border-color:var(--blue);}
select option{background:var(--surface2);}
textarea{resize:vertical;min-height:70px;}
button{font-family:var(--font);cursor:pointer;transition:all .15s;}
label{font-size:12px;color:var(--muted2);display:block;margin-bottom:4px;font-weight:500;}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at 30% 40%,rgba(59,130,246,0.06) 0%,transparent 60%),var(--bg);}
.login-card{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:40px;width:400px;max-width:94vw;}
.login-logo{font-size:24px;font-weight:600;color:var(--text);margin-bottom:4px;letter-spacing:-0.5px;}
.login-logo span{color:var(--blue);}
.login-sub{font-size:12px;color:var(--muted);margin-bottom:28px;}
.login-field{margin-bottom:14px;}
.btn-login{width:100%;background:var(--blue);color:#fff;border:none;border-radius:var(--r);padding:11px;font-size:14px;font-weight:500;margin-top:6px;}
.btn-login:hover{background:#2563eb;}
.quick-logins{margin-top:20px;border-top:1px solid var(--border);padding-top:16px;}
.quick-logins p{font-size:11px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.08em;}
.quick-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted2);padding:6px 12px;border-radius:6px;font-size:11px;margin-right:6px;margin-bottom:6px;}
.quick-btn:hover{border-color:var(--blue);color:var(--text);}

/* APP SHELL */
#appShell{display:none;min-height:100vh;}
.app-layout{display:grid;grid-template-columns:220px 1fr;grid-template-rows:56px 1fr;min-height:100vh;}
.topbar{grid-column:1/-1;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;position:sticky;top:0;z-index:100;}
.topbar-logo{font-size:18px;font-weight:600;color:var(--text);letter-spacing:-0.5px;margin-right:8px;}
.topbar-logo span{color:var(--blue);}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:16px 0;overflow-y:auto;}
.main-content{overflow-y:auto;background:var(--bg);}
.page{display:none;padding:24px;}
.page.active{display:block;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">Field<span>Pro</span></div>
    <div class="login-sub">Field Service Management Platform</div>
    <div class="login-field"><label>Email / Username</label><input id="loginUser" type="text" placeholder="admin@fieldpro.com" value="admin@fieldpro.com"></div>
    <div class="login-field"><label>Password</label><input id="loginPass" type="password" placeholder="••••••••" value="admin123"></div>
    <button class="btn-login" onclick="doLogin()">Sign In →</button>
    <div class="quick-logins">
      <p>Quick Login As:</p>
      <button class="quick-btn" onclick="quickLogin('admin')">👑 Admin</button>
      <button class="quick-btn" onclick="quickLogin('tech1')">🔧 Tech — Mike</button>
      <button class="quick-btn" onclick="quickLogin('tech2')">🔧 Tech — Sarah</button>
      <button class="quick-btn" onclick="quickLogin('customer')">👤 Customer Portal</button>
    </div>
  </div>
</div>

<!-- APP SHELL -->
<div id="appShell">
  <div class="app-layout">
    <!-- TOPBAR -->
    <div class="topbar">
      <div class="topbar-logo">Field<span>Pro</span></div>
      <div class="topbar-role" id="roleLabel">Admin</div>
      <div class="topbar-user" id="topbarUser">Admin User</div>
      <button onclick="logout()">Sign Out</button>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div style="padding:12px;">
        <div style="font-size:10px;color:#6b7a99;text-transform:uppercase;letter-spacing:.1em;padding:8px 8px 4px;font-weight:600;">Overview</div>
        <div class="nav-item active" onclick="nav('dashboard',this)" style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:#8892aa;font-size:13px;font-weight:500;transition:all .15s;user-select:none;">
          <span style="font-size:15px;width:18px;text-align:center;">📊</span> Dashboard
        </div>
        <div style="font-size:10px;color:#6b7a99;text-transform:uppercase;letter-spacing:.1em;padding:8px 8px 4px;font-weight:600;margin-top:16px;">Operations</div>
        <div class="nav-item" onclick="nav('dispatch',this)" style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:#8892aa;font-size:13px;font-weight:500;transition:all .15s;user-select:none;">
          <span style="font-size:15px;width:18px;text-align:center;">🗓</span> Dispatch Board
        </div>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
      <!-- DASHBOARD -->
      <div class="page active" id="page-dashboard">
        <div style="margin-bottom:24px;">
          <div style="font-size:20px;font-weight:600;color:#e8edf5;margin-bottom:4px;">Dashboard</div>
          <div style="font-size:13px;color:#6b7a99;" id="dashDate">Loading...</div>
        </div>
        <div style="font-size:24px;color:#e8edf5;text-align:center;padding:40px;">
          Welcome to FieldPro!<br>
          <small style="color:#6b7a99;">Full application coming soon...</small>
        </div>
      </div>

      <!-- DISPATCH -->
      <div class="page" id="page-dispatch">
        <div style="margin-bottom:24px;">
          <div style="font-size:20px;font-weight:600;color:#e8edf5;margin-bottom:4px;">Dispatch Board</div>
          <div style="font-size:13px;color:#6b7a99;">Drag and drop job assignments</div>
        </div>
        <div style="font-size:18px;color:#e8edf5;text-align:center;padding:40px;">
          Dispatch Board<br>
          <small style="color:#6b7a99;">Feature under development...</small>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// SIMPLE APP LOGIC
let currentPage = 'dashboard';

function doLogin() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value.trim();

  if ((user === 'admin@fieldpro.com' && pass === 'admin123') ||
      (user === 'mike.j' && pass === 'pass123') ||
      (user === 'sarah.l' && pass === 'pass123') ||
      (user === 'customer@portal.com' && pass === 'cust123')) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appShell').style.display = 'block';
    updateDate();
    return;
  }

  alert('Invalid credentials');
}

function quickLogin(type) {
  const logins = {
    admin: ['admin@fieldpro.com', 'admin123'],
    tech1: ['mike.j', 'pass123'],
    tech2: ['sarah.l', 'pass123'],
    customer: ['customer@portal.com', 'cust123']
  };

  const [user, pass] = logins[type];
  document.getElementById('loginUser').value = user;
  document.getElementById('loginPass').value = pass;
  doLogin();
}

function nav(page, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  if (el) el.classList.add('active');
  currentPage = page;
}

function logout() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appShell').style.display = 'none';
}

function updateDate() {
  document.getElementById('dashDate').textContent =
    new Date().toLocaleDateString('en-US', {
      weekday: 'long',
      year: 'numeric',
      month: 'long',
      day: 'numeric'
    });
}

// Initialize
updateDate();
</script>

</body>
</html>
